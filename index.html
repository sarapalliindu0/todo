<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful To-Do List</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Poppins, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
}

.container{
    width:350px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#7b2cbf;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f1f1f1;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#7b2cbf;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a189a;
}

ul{
    margin-top:20px;
}

li{
    list-style:none;
    background:#f8edff;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

li.completed{
    text-decoration: line-through;
    opacity:0.6;
}

.delete{
    cursor:pointer;
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>My To-Do List ✨</h1>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask(){
    let input = document.getElementById("taskInput");
    let taskText = input.value;

    if(taskText === "") return;

    let li = document.createElement("li");

    li.innerHTML = `
        <span onclick="toggleTask(this)">${taskText}</span>
        <span class="delete" onclick="deleteTask(this)">✖</span>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}

function deleteTask(element){
    element.parentElement.remove();
}

function toggleTask(element){
    element.parentElement.classList.toggle("completed");
}
</script>

</body>
</html>
